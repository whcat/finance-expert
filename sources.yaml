# 追蹤來源設定檔
# enabled: false 的來源會被跳過。填好後改成 true。

settings:
  whisper_model: medium      # tiny / base / small / medium / large-v3（越大越準越慢）
  language: zh               # 轉錄語言
  max_new_items: 3           # 每個來源每次執行最多處理幾集（回補歷史時可調大）
  audio_dir: audio_cache
  transcript_dir: transcripts

youtube:
  # url 填頻道網址（@handle 或 /channel/ 形式皆可）
  - name: 游庭皓的財經皓角
    url: https://www.youtube.com/@yutinghaofinance/streams
    enabled: true
  - name: 數字台灣
    url: https://www.youtube.com/@%E6%95%B8%E5%AD%97%E5%8F%B0%E7%81%A3
    enabled: false   # 2026-07-12 使用者指示：不再維持更新，除非重新下指令再改回 true
  - name: MacroMicro財經M平方
    url: https://www.youtube.com/channel/UC6LU7FUBvbFCh_cQasrHZ_Q
    enabled: true


